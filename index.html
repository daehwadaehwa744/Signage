        .animate-fadeIn { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* 유틸리티 */

        .cursor-grabbing { cursor: grabbing; }

            useEffect(() => {
                const fetchWeather = async () => {
                    try {
                        // 날씨와 대기질(미세먼지) 데이터를 병렬로 동시에 가져옵니다. (주간 예보에 필요한 상세 데이터 파라미터 추가)
                        const [weatherRes, aqRes] = await Promise.all([
                            fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.6745&longitude=126.7479&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,wind_speed_10m_max,apparent_temperature_max&timezone=Asia%2FSeoul`),

                        ]);
                        
                        const weatherData = await weatherRes.json();
                        const aqData = await aqRes.json();
                        
                        if (weatherData.current && weatherData.daily) {
                            const currentInfo = getWeatherInfo(weatherData.current.weather_code);
                            
                            // 일출/일몰 시간 포맷 변환
                            const formatTime = (isoString) => {
                                if (!isoString) return '-';
                                const date = new Date(isoString);
                                return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });

                            // 미세먼지 수치 기반 대기질 등급 계산
                            const pm10 = aqData.current?.pm10 || 0;
                            const pm25 = aqData.current?.pm2_5 || 0;
                            
                            let aqiDesc = '좋음';
                            let aqiColor = 'text-blue-500';
                            let aqiBg = 'bg-blue-400';
                            
                            if (pm10 > 150 || pm25 > 75) { aqiDesc = '매우나쁨'; aqiColor = 'text-red-500'; aqiBg = 'bg-red-500'; }
                            else if (pm10 > 80 || pm25 > 35) { aqiDesc = '나쁨'; aqiColor = 'text-orange-500'; aqiBg = 'bg-orange-500'; }
                            else if (pm10 > 30 || pm25 > 15) { aqiDesc = '보통'; aqiColor = 'text-emerald-500'; aqiBg = 'bg-emerald-500'; }

                            setWeather({ 
                                temp: Math.round(weatherData.current.temperature_2m), 
                                feelsLike: Math.round(weatherData.current.apparent_temperature),
                                desc: currentInfo.desc, 
                                iconName: currentInfo.iconName, 
                                color: currentInfo.color, 
                                modalColor: currentInfo.modalColor,

                                sunset: formatTime(weatherData.daily.sunset[0]),
                                pm10: Math.round(pm10),
                                pm25: Math.round(pm25),
                                aqiDesc,
                                aqiColor,
                                aqiBg
                            });
                            
                            const weekly = weatherData.daily.time.map((time, idx) => {
                                const dateObj = new Date(time);
                                const dayStr = dateObj.toLocaleDateString('ko-KR', { weekday: 'short' });
                                const info = getWeatherInfo(weatherData.daily.weather_code[idx]);
                                return {
                                    day: idx === 0 ? '오늘' : dayStr,
                                    maxTemp: Math.round(weatherData.daily.temperature_2m_max[idx]),
                                    minTemp: Math.round(weatherData.daily.temperature_2m_min[idx]),
                                    feelsLike: Math.round(weatherData.daily.apparent_temperature_max[idx]),
                                    precip: weatherData.daily.precipitation_sum[idx],
                                    wind: weatherData.daily.wind_speed_10m_max[idx],
                                    sunrise: formatTime(weatherData.daily.sunrise[idx]),

                                    pm10: idx === 0 ? Math.round(pm10) : null,
                                    pm25: idx === 0 ? Math.round(pm25) : null,
                                    aqiDesc: idx === 0 ? aqiDesc : null,

                                    aqiBg: idx === 0 ? aqiBg : null,
                                    iconName: info.iconName,
                                    color: info.color,
                                    modalColor: info.modalColor
                                };
                            }).slice(0, 7); 
                            setWeeklyWeather(weekly);
                        }
                    } catch (e) { 
                        // 에러 시 임시 데이터 설정
                        setWeather(prev => ({ ...prev, temp: '22', desc: '맑음', iconName: 'sun', color: 'text-yellow-400', modalColor: 'text-orange-500' }));

            // 식단 데이터 파싱 (복지관 웹사이트 직접 크롤링 방식으로 변경)
            useEffect(() => {
                const fetchMenuData = async () => {
                    try {
                        const urlsToScrape = [
                            'https://www.dh-seniorwelfarecenter.co.kr/about/guide_list.php',
                            'https://www.dh-seniorwelfarecenter.co.kr/about/guide_list.php?boardid=diet&sk=&sw=&category=&offset=10'
                        ];
                        
                        const proxies = [
                            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                            (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
                        ];

                        let allItems = [];
                        const today = new Date();
                        const todayVal = (today.getMonth() + 1) * 100 + today.getDate();

                        for (const targetUrl of urlsToScrape) {
                            let htmlText = '';
                            let fetchSuccess = false;

                            for (const proxyFn of proxies) {
                                try {
                                    const res = await fetch(proxyFn(targetUrl));
                                    if (res.ok) {
                                        htmlText = await res.text();
                                        if (htmlText.includes('식단 목록')) {
                                            fetchSuccess = true;
                                            break; 
                                        }
                                    }
                                } catch (e) {}
                            }

                            if (!fetchSuccess) continue; // 현재 URL 실패 시 다음 URL 시도

                            // HTML 문자열을 DOM 객체로 파싱
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(htmlText, "text/html");

                            // '식단 목록' 캡션을 가진 테이블 찾기
                            const captions = Array.from(doc.querySelectorAll("caption"));
                            const targetCaption = captions.find(c => c.textContent.includes("식단 목록"));
                            
                            if (targetCaption) {
                                const table = targetCaption.closest("table");
                                const rows = table.querySelectorAll("tbody tr");

                                const parsedItems = Array.from(rows).map(row => {
                                    const cells = row.querySelectorAll("td, th");
                                    // 열이 2개 미만인 빈 칸 패스
                                    if (cells.length < 2) return null;

                                    // 첫 번째 열(cells[0])은 1211, 1210 같은 게시판 번호이므로 패스!
                                    // 두 번째 열(cells[1])에서 날짜와 식단 제목을 추출합니다.
                                    const originalTitle = cells[1].textContent.trim();
                                    
                                    // 세 번째 열(cells[2])부터 메뉴 내용 추출 (게시판 구조에 따라)
                                    // 만약 열이 두 개뿐이라면 두 번째 열을 사용합니다.
                                    let originalDesc = "";
                                    const startIdx = cells.length > 2 ? 2 : 1;
                                    
                                    for(let i = startIdx; i < cells.length; i++) {
                                        originalDesc += cells[i].innerHTML + "<br>";
                                    }

                                    let title = originalTitle;
                                    
                                    // 1) 여러 개의 하이픈(--) 및 괄호, 모든 형태의 요일 완벽 제거
                                    title = title.replace(/[-~_=—–\s]*[\[\(\{]?\s*[월화수목금토일]요일?\s*[\]\)\}]?/g, '');
                                    title = title.replace(/[-~_=—–\s]+$/, '').trim(); 
                                    title = title.replace(/^[-~_=—–\s]+/, '').trim(); // 앞쪽 찌꺼기도 제거
                                    if (!title) title = "식단 안내";

                                    // 2) 날짜 추출 고도화 (2026년 4월 17일, 4월 17일, 4.17 등 한글/특수문자 유연한 지원)
                                    let dateVal = 0;
                                    const fullDateMatch = originalTitle.match(/(\d{4})[-.\/년\s]*(\d{1,2})[-.\/월\s]*(\d{1,2})/);
                                    if (fullDateMatch) {
                                        dateVal = parseInt(fullDateMatch[2]) * 100 + parseInt(fullDateMatch[3]);
                                    } else {
                                        const shortDateMatch = originalTitle.match(/(\d{1,2})[-.\/월\s]*(\d{1,2})[일]?/);
                                        if (shortDateMatch) {
                                            dateVal = parseInt(shortDateMatch[1]) * 100 + parseInt(shortDateMatch[2]);
                                        }
                                    }

                                    // 3) 식단 본문 텍스트 강화된 필터링
                                    // 줄바꿈 태그(<br>, p태그, 실제 줄바꿈)를 콤마로 임시 변경 후 텍스트 변환
                                    let desc = originalDesc.replace(/<\/p>|<\/div>|<br\s*\/?>|\n|\r/gi, ',');
                                    desc = desc.replace(/<[^>]*>?/gm, ' '); // 남은 태그 제거
                                    
                                    // 영문, 숫자, 불필요한 단위/기호 완벽 제거
                                    desc = desc.replace(/[0-9.:a-zA-Z]+/g, ''); 
                                    desc = desc.replace(/인분|칼로리|제공량|kcal|g|mg|ml|%/gi, '');
                                    
                                    // 콤마를 기준으로 완벽하게 나누고 배열 정리
                                    const menuList = desc.split(',').map(line => {
                                        // 특수기호 완전 제거
                                        let cl = line.replace(/[-~_=—–*※▶\[\]\(\)\{\}\<\>]+/g, ' ').trim();
                                        
                                        // 요일 단어 및 식단 관련 불필요한 헤더 텍스트 제거
                                        cl = cl.replace(/[월화수목금토일]요일/g, ' ').trim();
                                        cl = cl.replace(/식단안내|식단표|오늘의식단|식단|메뉴|중식|석식|조식/g, ' ').trim();
                                        cl = cl.replace(/\s{2,}/g, ' '); // 다중 공백 단일화
                                        
                                        // 텍스트가 "월", "화" 등 단일 요일 글자만 남은 경우 비우기 (찌꺼기 요일 완벽 제거)
                                        if (/^[월화수목금토일]$/.test(cl.replace(/\s/g, ''))) return '';
                                        
                                        // 작성자, 첨부, 조회수 등 게시판의 불필요한 열 정보 필터링
                                        if (cl === '관리자' || cl === '첨부' || cl === '조회수' || cl === '파일' || cl === '목록') return '';
                                        
                                        return cl;
                                    }).filter(line => line && line.replace(/\s/g, '').length > 0);
                                    
                                    const cleanedDesc = menuList.join('\n');
                                    
                                    return { title, desc: cleanedDesc, dateVal }; 
                                }).filter(item => item !== null);

                                allItems = [...allItems, ...parsedItems];

                                // 현재 페이지에서 찾은 항목 중 오늘/미래 날짜의 식단이 포함되어 있는지 확인
                                const hasTodayOrFutureMenu = parsedItems.some(item => item.dateVal >= todayVal || item.dateVal === 0);
                                
                                // 충분한 식단 데이터(오늘/미래)를 찾았다면, 다음 페이지(offset=10)를 긁지 않고 종료
                                if (hasTodayOrFutureMenu) {
                                    break;
                                }
                            }
                        }
                        
                        // 오늘 날짜 기준 필터링 및 오름차순 정렬
                        let filtered = allItems.filter(item => item.dateVal >= todayVal || item.dateVal === 0);
                        
                        // 빈 정보(식단 내용이 완전히 없는 경우) 출력 제외
                        filtered = filtered.filter(item => item.desc && item.desc.trim().length > 0);

                        filtered.sort((a, b) => {
                            if (a.dateVal && b.dateVal) return a.dateVal - b.dateVal;
                            return 0;
                        });

                        if (filtered.length > 0) {
                            setMenuPosts(filtered.slice(0, 14)); 
                        } else {
                            setMenuPosts(FALLBACK_MENU); 
                        }
                    } catch (e) { 
                        setMenuPosts(FALLBACK_MENU);
                    }
                };
                fetchMenuData();
                const timer = setInterval(fetchMenuData, 3600000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const fetchRSS = async (isBackground = false) => {
                    if (!isBackground) setLoading(true);
                    try {
                        const RSS_URL = 'https://rss.blog.naver.com/daehwasenior1352.xml';
                        let xmlText = '';
                        let success = false;
                        
                        const proxies = [
                            `https://api.allorigins.win/raw?url=${encodeURIComponent(RSS_URL)}`,
                            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(RSS_URL)}`,
                            `https://corsproxy.io/?${encodeURIComponent(RSS_URL)}`
                        ];

                        for (const proxyUrl of proxies) {
                            try {
                                const res = await fetch(proxyUrl);
                                if (res.ok) {
                                    const text = await res.text();
                                    if (text.includes('<rss') || text.includes('<feed') || text.includes('<?xml')) {
                                        xmlText = text;
                                        success = true;
                                        break; 
                                    }
                                }
                            } catch (e) {}
                        }

                        if (!success) throw new Error("All proxies failed");

                        const parser = new DOMParser();
                        const xml = parser.parseFromString(xmlText, "text/xml");
                        const items = Array.from(xml.querySelectorAll("item"));
                        
                        if (items.length > 0) {
                            const parsedPosts = items.map(item => {
                                const title = item.querySelector("title")?.textContent || "";
                                const pubDateStr = item.querySelector("pubDate")?.textContent || "";
                                const category = item.querySelector("category")?.textContent.trim() || "새로운 소식";
                                const link = item.querySelector("link")?.textContent.trim().replace("blog.naver.com", "m.blog.naver.com") || "";
                                let encodedNode = item.getElementsByTagNameNS("http://purl.org/rss/1.0/modules/content/", "encoded")[0] || item.getElementsByTagName("content:encoded")[0];
                                let contentNode = (encodedNode ? encodedNode.textContent : null) || item.querySelector("description")?.textContent || "";
                                const d = new Date(pubDateStr);
                                const pubDate = isNaN(d) ? pubDateStr.split(' ')[0] : `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                                const imgMatch = contentNode.match(/<img[^>]+src="([^">]+)"/);
                                let textContent = contentNode.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n\n').replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ').trim();
                                textContent = textContent.replace(/\n{3,}/g, '\n\n'); 
                                return { title, pubDate, category, link, thumbnail: imgMatch ? imgMatch[1] : null, description: textContent.replace(/\n/g, ' ').substring(0, 120) + '...', fullContent: textContent };
                            });

                            if (isBackground) {
                                const currentFirstTitle = postsRef.current[0]?.title;
                                const newFirstTitle = parsedPosts[0]?.title;
                                if (currentFirstTitle !== newFirstTitle) {
                                    const currentActivePost = postsRef.current[activeIndexRef.current];
                                    let newActiveIndex = 0;
                                    if (currentActivePost) {
                                        const foundIndex = parsedPosts.findIndex(p => p.title === currentActivePost.title);
                                        if (foundIndex !== -1) newActiveIndex = foundIndex;
                                    }
                                    setPosts(parsedPosts);
                                    setActiveIndex(newActiveIndex);
                                }
                            } else {
                                setPosts(parsedPosts);
                            }
                        } else {
                            throw new Error("No items parsed");
                        }
                    } catch (error) { 
                        if (!isBackground) setPosts(FALLBACK_POSTS); 
                    } finally { 
                        if (!isBackground) setLoading(false); 
                    }
                };

                fetchRSS(false);
                const bgSyncTimer = setInterval(() => fetchRSS(true), 600 * 1000); 
                return () => clearInterval(bgSyncTimer);
            }, []);

            useEffect(() => {
                if (activeTab === 'location') {
                    const GOOGLE_MAPS_KEY = 'YOUR_GOOGLE_MAPS_API_KEY'; 
                    
                    // API 키가 기본값(placeholder)일 경우 API 요청 자체를 차단하여 콘솔 에러 방지
                    if (GOOGLE_MAPS_KEY === 'YOUR_GOOGLE_MAPS_API_KEY') {
                        setMapError(true);
                        return;
                    }
                    
                    const initGoogleMap = () => {
                        const container = document.getElementById('google-map-container');
                        if (container && window.google && window.google.maps) {
                            try {
                                const position = { lat: 37.675037, lng: 126.744186 };
                                const map = new window.google.maps.Map(container, {
                                    center: position,
                                    zoom: 15,
                                    disableDefaultUI: false,
                                });
                                new window.google.maps.Marker({
                                    position: position,
                                    map: map,
                                });
                                setMapError(false);
                            } catch(e) { setMapError(true); }
                        }
                    };

                    if (!document.getElementById('google-map-script')) {
                        window.initMap = initGoogleMap;
                        
                        // 인증 실패 시 (잘못된 API 키 등) 발생되는 에러를 처리하는 글로벌 콜백
                        window.gm_authFailure = () => setMapError(true);

                        const script = document.createElement('script');
                        script.id = 'google-map-script';
                        script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&callback=initMap`;
                        script.async = true;
                        script.defer = true;
                        document.head.appendChild(script);
                        script.onerror = () => setMapError(true);
                    } else if (window.google && window.google.maps) {
                        initGoogleMap();
                    }
                }
            }, [activeTab]);

            const displayPosts = posts.slice(0, settings.postCount);
            const activePost = displayPosts[activeIndex] || displayPosts[0];

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (displayPosts.length === 0 || selectedPost || isAdminOpen || webViewUrl || activeTab !== 'news') return;
                const timer = setInterval(() => setActiveIndex(current => (current + 1) % displayPosts.length), settings.interval * 1000);
                return () => clearInterval(timer);
            }, [displayPosts.length, selectedPost, activeIndex, settings.interval, isAdminOpen, webViewUrl, activeTab]);

            const handlePrev = () => setActiveIndex(prev => (prev - 1 + displayPosts.length) % displayPosts.length);
            const handleNext = () => setActiveIndex(prev => (prev + 1) % displayPosts.length);

            const autoCloseTimerRef = useRef(null);
            const resetAutoCloseTimer = useCallback(() => {
                if (autoCloseTimerRef.current) clearTimeout(autoCloseTimerRef.current);
                if ((selectedPost || selectedWeatherDay || selectedRoom || webViewUrl || activeTab !== 'news') && settings.autoCloseTimeout > 0) {
                    autoCloseTimerRef.current = setTimeout(() => { 
                        setSelectedPost(null); 
                        setSelectedWeatherDay(null);
                        setSelectedRoom(null);
                        setWebViewUrl(null); 
                        setActiveTab('news');
                    }, settings.autoCloseTimeout * 1000);
                }
            }, [selectedPost, selectedWeatherDay, selectedRoom, webViewUrl, activeTab, settings.autoCloseTimeout]);

            useEffect(() => { resetAutoCloseTimer(); return () => clearTimeout(autoCloseTimerRef.current); }, [resetAutoCloseTimer]);

            const listPointerRef = useRef({ startY: 0, isDragging: false });
            const onListDown = (e) => { listPointerRef.current.startY = e.clientY; listPointerRef.current.isDragging = false; };
            const onListMove = (e) => { 
                if (e.buttons > 0 || e.type.includes('touch')) {
                    if (Math.abs(e.clientY - listPointerRef.current.startY) > 10) {
                        listPointerRef.current.isDragging = true; 
                    }
                }
            };
            const onListUp = (e) => {
                try { if (e.currentTarget.hasPointerCapture(e.pointerId)) e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}
                if (listPointerRef.current.isDragging) {
                    const diff = listPointerRef.current.startY - e.clientY;
                    if (diff > 50) handleNext(); else if (diff < -50) handlePrev();
                }
            };
            const onListClick = (idx, post) => { if (!listPointerRef.current.isDragging) { setActiveIndex(idx); setSelectedPost(post); } };

            const mainPointerRef = useRef({ startX: 0, isDragging: false });
            const onMainDown = (e) => { mainPointerRef.current.startX = e.clientX; mainPointerRef.current.isDragging = false; };
            const onMainMove = (e) => { 
                if (e.buttons > 0 || e.type.includes('touch')) {
                    if (Math.abs(e.clientX - mainPointerRef.current.startX) > 10) {
                        mainPointerRef.current.isDragging = true; 
                    }
                }
            };
            const onMainUp = (e) => {
                try { if (e.currentTarget.hasPointerCapture(e.pointerId)) e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}
                if (mainPointerRef.current.isDragging) {
                    const diff = mainPointerRef.current.startX - e.clientX;
                    if (diff > 50) handleNext(); else if (diff < -50) handlePrev();
                }
            };
            const onMainClick = () => { if (!mainPointerRef.current.isDragging) setSelectedPost(activePost); };

            const modalPointerRef = useRef({ startY: 0, startScroll: 0, isDragging: false });
            const modalScrollRef = useRef(null);
            const onModalDown = (e) => { modalPointerRef.current.isDragging = true; modalPointerRef.current.startY = e.clientY; modalPointerRef.current.startScroll = modalScrollRef.current.scrollTop; resetAutoCloseTimer(); };
            const onModalMove = (e) => { if (!modalPointerRef.current.isDragging) return; if (e.buttons > 0 || e.type.includes('touch')) { modalScrollRef.current.scrollTop = modalPointerRef.current.startScroll - (e.clientY - modalPointerRef.current.startY) * 1.5; resetAutoCloseTimer(); } };
            const onModalUp = (e) => { modalPointerRef.current.isDragging = false; try { if (e.currentTarget.hasPointerCapture(e.pointerId)) e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {} resetAutoCloseTimer(); };

            const timeString = currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            const dateString = currentTime.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });

            if (loading) {
                return (
                    <div className="flex flex-col items-center justify-center w-full h-screen bg-stone-100">
                        <div className={`w-14 h-14 border-4 ${colors.spinner} border-t-transparent rounded-full animate-spin mb-6`}></div>
                        <p className="text-xl font-bold text-stone-600 tracking-tight">복지관 소식을 불러오고 있습니다...</p>
                    </div>
                );
            }

            const itemHeight = mode === '16:9' ? 110 : 96;
            const currentFloorPlan = settings.floorPlan[currentFloor] || [];
            const adminFloorPlanPreview = tempSettings.floorPlan[adminSelectedFloor] || [];

            return (
                <div ref={containerRef} className={`min-h-screen flex flex-col items-center justify-center bg-[#eaeaea] ${isFullscreen ? 'fixed inset-0 z-[100] w-full h-full p-0' : 'relative p-3 sm:p-6'}`} style={{ fontSize: `${settings.fontScale}%` }}>
                    
                    <div className={`bg-stone-50 shadow-[0_8px_30px_rgb(0,0,0,0.12)] flex flex-col overflow-hidden transition-all duration-500 relative ${isFullscreen ? 'w-full h-full rounded-none' : (mode === '16:9' ? 'w-full max-w-[1280px] aspect-video rounded-3xl' : 'h-[85vh] aspect-[9/16] rounded-3xl')}`}>
                        
                        {/* 상단 헤더 영역 */}
                        <header style={{ fontSize: `${settings.fontScaleHeader || 100}%` }} className={`${colors.header} text-white z-10 flex relative ${mode === '16:9' ? 'px-[2em] py-[1em] flex-row justify-between items-center' : 'pt-[1.5em] pb-[1.25em] flex-col items-center justify-center gap-[0.75em]'}`}>
                            
                            <div className={`flex items-center min-w-0 ${mode === '16:9' ? 'gap-[1em]' : 'gap-[0.75em] w-full justify-center px-[1em]'}`}>
                                <div className={`bg-white ${colors.iconText} flex-shrink-0 rounded-full flex items-center justify-center shadow-inner animate-heart-pulse ${mode === '16:9' ? 'p-[0.5em] w-[2.75em] h-[2.75em]' : 'p-[0.4em] w-[2.25em] h-[2.25em]'}`}>
                                    <Icon name="heart" size={mode === '16:9' ? "1.5em" : "1.25em"} />
                                </div>
                                <div className={`flex flex-col min-w-0 text-left`}>
                                    <h1 className={`font-extrabold tracking-tight drop-shadow-sm truncate break-keep ${mode === '16:9' ? 'text-[1.5em]' : 'text-[1.25em]'}`}>고양시대화노인종합복지관 소식</h1>
                                    {mode === '16:9' && <p className={`${colors.subtitle} text-[0.875em] mt-[0.125em] font-medium tracking-wide truncate`}>Know-人의 미래를 잇는 선배시민복지관</p>}
                                </div>
                            </div>
                            
                            <div className={`flex items-center flex-shrink-0 flex-nowrap justify-center whitespace-nowrap ${colors.weatherBg} rounded-full border border-white/10 backdrop-blur-sm shadow-inner ${mode === '16:9' ? 'px-[1.25em] py-[0.625em] gap-[1em]' : 'px-[0.8em] py-[0.35em] gap-[0.45em] w-auto max-w-[98%] overflow-hidden text-[0.8em]'}`}>
                                <div className="flex items-center gap-[0.3em]">
                                    <Icon name={weather.iconName} size={mode === '16:9' ? "1.125em" : "0.9em"} className={weather.color} />
                                    <span className={`font-bold tracking-wide leading-none ${mode === '16:9' ? 'text-[0.9375em]' : 'text-[0.85em]'}`}>{weather.desc} {weather.temp}°C</span>
                                </div>
                                <div className="w-px h-[0.75em] bg-white/30 mx-[0.1em]"></div>
                                <div className="flex items-center gap-[0.3em]">
                                    <Icon name="calendar" size={mode === '16:9' ? "1.125em" : "0.9em"} className={colors.dateText} />
                                    <span className={`font-bold tracking-wide leading-none ${mode === '16:9' ? 'text-[0.9375em]' : 'text-[0.85em]'}`}>{dateString}</span>
                                </div>
                                <div className="w-px h-[0.75em] bg-white/30 mx-[0.1em]"></div>
                                <div className="flex items-center gap-[0.3em]">
                                    <Icon name="clock" size={mode === '16:9' ? "1.125em" : "0.9em"} className={colors.dateText} />
                                    <span className={`font-bold tracking-wide leading-none ${mode === '16:9' ? 'text-[0.9375em]' : 'text-[0.85em]'}`}>{timeString}</span>
                                </div>
                            </div>
                        </header>

                        {/* 5개 탭 분리 유지 - 하단 틈새 완전 밀착을 위해 items-end 적용 */}
                        <div className={`flex items-end w-full pt-[0.3em] px-[0.5em] gap-[0.2em] ${colors.header} shadow-inner z-10 flex-shrink-0 ${mode === '16:9' ? '' : 'justify-between'}`}>
                          {TABS.map(tab => {
                            const isActive = activeTab === tab.id;
                            return (
                              <button
                                key={tab.id}
                                onClick={() => { setActiveTab(tab.id); resetAutoCloseTimer(); }}
                                className={`
                                  relative flex flex-1 flex-col items-center justify-center gap-[0.1em] font-bold rounded-t-[0.75em] transition-all select-none
                                  ${mode === '16:9' ? 'flex-row px-[1.25em] text-[1.05em]' : 'text-[0.85em] px-[0.1em]'}
                                  ${isActive 
                                    ? 'bg-white text-stone-900 z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.08)] py-[0.5em]' 
                                    : 'bg-black/10 text-white/70 hover:bg-black/20 hover:text-white border-x border-t border-white/5 py-[0.4em]'}
                                `}
                              >
                                 <Icon name={tab.iconName} size={mode === '16:9' ? "1.15em" : "1.05em"} className={isActive ? colors.listIcon.replace('text-', 'text-') : 'opacity-80'} />
                                 <span className="whitespace-nowrap tracking-tight leading-none mt-[0.1em]">{tab.label}</span>
                              </button>
                            )
                          })}
                        </div>

                        {/* 중앙 콘텐츠 */}
                        <div className={`flex-1 flex overflow-hidden bg-white relative ${mode === '16:9' && activeTab === 'news' ? 'flex-row' : 'flex-col'}`}>
                            
                            {/* 1. 주요 소식 탭 */}
                            {activeTab === 'news' && (
                              <>
                                {/* 좌측 메인 비주얼 영역 (화살표 버튼 완전히 제거) */}
                                <div 
                                    style={{ fontSize: `${settings.fontScaleMain || 100}%` }}
                                    className={`${mode === '16:9' ? 'w-3/5 border-r' : 'h-[50%] border-b'} border-stone-200 relative bg-stone-900 overflow-hidden flex-shrink-0 cursor-pointer group select-none`}
                                    onPointerDown={onMainDown} onPointerMove={onMainMove} onPointerUp={onMainUp} onClick={onMainClick}
                                >
                                    <div className="absolute inset-0 w-full h-full transition-transform duration-[15s] ease-out group-hover:scale-105 pointer-events-none">
                                        {activePost?.thumbnail ? (

                                                    <div className="space-y-2">
                                                        <label className="font-bold text-stone-600 text-xs break-keep">주요 소식(왼쪽): {tempSettings.fontScaleMain || 100}%</label>

                                                    </div>
                                                    <div className="space-y-2">
                                                        <label className="font-bold text-stone-600 text-xs break-keep">소식 목록(오른쪽): {tempSettings.fontScaleList || 100}%</label>

                                                    </div>
                                                    <div className="space-y-2">
                                                        <label className="font-bold text-stone-600 text-xs break-keep">상세 안내 팝업: {tempSettings.fontScaleModal || 100}%</label>

                                    {adminTab === 'floorMap' && (
                                        <div className="flex flex-col md:flex-row h-full">
                                            {/* 왼쪽: 에디터 폼 */}

                                                <div className="mb-6 flex justify-between items-end">

                                                                <button 
                                                                    key={f} 
                                                                    onClick={() => { setAdminSelectedFloor(f); setAdminSelectedRoomId(null); }}

                                                                        <option value="info">안내/정보 (Info)</option>
                                                                        <option value="layout">일반 공간 (Room)</option>
                                                                        <option value="users">사무실/인물 (Users)</option>

                                                })() : (
                                                    <div className="flex-1 flex flex-col items-center justify-center p-6 border-2 border-dashed border-stone-200 rounded-xl text-stone-400 text-center">
                                                        <Icon name="layout" size={32} className="mb-2 opacity-50" />
                                                        <p className="text-sm font-bold">위 목록에서 수정할<br/>요소를 선택해주세요.</p>
                                                    </div>
                                                )}
                                                
                                                <p className="mt-auto pt-6 text-xs text-stone-400 font-medium break-keep">
                                                    * 미리보기 도면에서 각 요소의 크기와 위치를 조정해 실제 화면에 어떻게 나타날지 확인하세요. (비율 기준 조정)
                                                </p>
                                            </div>
                                            
                                            {/* 오른쪽: 라이브 미리보기 캔버스 (4:3 비율 고정 및 통일된 폰트 렌더링) */}
                                            <div className="w-full md:w-2/3 p-4 md:p-8 flex items-center justify-center bg-stone-200 min-h-0">
                                                <div className="bg-white rounded-2xl shadow-[inset_0_10px_40px_rgba(0,0,0,0.06)] border-[4px] border-white relative overflow-hidden ring-1 ring-stone-300 shrink-0"
                                                     style={{
                                                         containerType: 'size', // 반응형 폰트 스케일링을 위한 컨테이너 정의
                                                         width: mode === '16:9' ? 'auto' : '100%',
                                                         height: mode === '16:9' ? '100%' : 'auto',
                                                         aspectRatio: '4/3',
                                                         maxWidth: '100%',
                                                         maxHeight: '100%'
                                                     }}>
                                                    
                                                    {/* 통합된 기준 폰트 크기 설정 (cqmin 적용) */}
                                                    <div className="absolute inset-0" style={{ fontSize: '2.5cqmin' }}>
                                                        <div className="absolute inset-0 bg-[linear-gradient(rgba(0,0,0,0.04)_1px,transparent_1px),linear-gradient(90deg,rgba(0,0,0,0.04)_1px,transparent_1px)] pointer-events-none" style={{ backgroundSize: '3cqmin 3cqmin' }}></div>
                                                        
                                                        {adminFloorPlanPreview.map(room => {
                                                            const isStructural = room.icon === 'elevator' || room.icon === 'stairs' || room.name.includes('화장실') || room.name.includes('방재실') || room.name.includes('주차장');
                                                            const isCurrentLocation = room.icon === 'navigation' || room.name.includes('현 위치');
                                                            const isEntrance = room.icon === 'door' || room.name.includes('출입구');
                                                            
                                                            let roomStyleClass = "";
                                                            let iconStyleClass = "";
                                                            let textStyleClass = "";
                                                            
                                                            if (adminSelectedRoomId === room.id) {
                                                                roomStyleClass = "border-red-500 bg-red-50 z-40 shadow-md ring-4 ring-red-500/20 rounded-[1em] border-[0.15em] overflow-hidden";
                                                                iconStyleClass = "text-red-500";
                                                                textStyleClass = "text-red-600";
                                                            } else if (isCurrentLocation) {
                                                                roomStyleClass = "z-40 animate-bounce border-0";
                                                                iconStyleClass = "text-rose-600 drop-shadow-[0_8px_8px_rgba(225,29,72,0.5)]";
                                                                textStyleClass = "text-rose-700 bg-white/90 px-[0.5em] py-[0.1em] rounded-lg shadow-sm border border-rose-200 mt-[0.2em]";
                                                            } else if (isEntrance) {
                                                                roomStyleClass = "z-30 animate-bounce border-0";
                                                                iconStyleClass = "text-blue-600 drop-shadow-[0_8px_8px_rgba(37,99,235,0.5)]";
                                                                textStyleClass = "text-blue-800 bg-white/90 px-[0.5em] py-[0.1em] rounded-lg shadow-sm border border-blue-200 mt-[0.2em]";
                                                            } else if (isStructural) {
                                                                roomStyleClass = "bg-stone-200/80 border-stone-300 hover:bg-stone-300 z-0 rounded-[1em] border-[0.15em] overflow-hidden";
                                                                iconStyleClass = "opacity-80 text-stone-600";
                                                                textStyleClass = "text-stone-600";
                                                            } else {
                                                                roomStyleClass = "bg-white/95 border-stone-200/80 hover:border-stone-400 z-10 rounded-[1em] border-[0.15em] overflow-hidden";
                                                                iconStyleClass = "opacity-60 text-stone-500";
                                                                textStyleClass = "text-stone-700";
                                                            }

                                                            return (
                                                                <div 
                                                                    key={room.id}
                                                                    onClick={() => setAdminSelectedRoomId(room.id)}
                                                                    className={`absolute flex flex-col items-center justify-center text-center cursor-pointer transition-all select-none group ${roomStyleClass}`}
                                                                    style={{
                                                                        left: `${room.x}%`,
                                                                        top: `${room.y}%`,
                                                                        width: `${room.w}%`,
                                                                        height: `${room.h}%`,
                                                                    }}
                                                                >
                                                                    <div className={`flex flex-col items-center justify-center w-full h-full p-[0.3em]`}>
                                                                        <Icon name={room.icon || 'info'} size={(isCurrentLocation || isEntrance) && adminSelectedRoomId !== room.id ? "2.5em" : "1.8em"} className={`shrink-0 ${(isCurrentLocation || isEntrance) && adminSelectedRoomId !== room.id ? 'mb-[0.1em]' : 'mb-[0.2em]'} ${iconStyleClass}`} />
                                                                        <div className="w-full flex items-center justify-center min-h-0">
                                                                            <span className={`font-bold leading-[1.15] tracking-tight break-keep text-center pointer-events-none ${textStyleClass}`}
                                                                                  style={{ fontSize: '0.85em', wordBreak: 'keep-all' }}>
                                                                                {room.name.includes('\n') ? room.name.split('\n').map((l, i) => <span key={i} className="block">{l}</span>) : room.name}
                                                                            </span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="p-6 bg-white border-t border-stone-100 flex gap-3 flex-shrink-0">
                                    <button onClick={() => setIsAdminOpen(false)} className="flex-1 py-4 rounded-xl font-black text-stone-500 bg-stone-100 hover:bg-stone-200 transition-colors break-keep">취소</button>
                                    <button onClick={handleSaveSettings} className={`flex-[2] py-4 rounded-xl font-black text-white transition-all shadow-md flex items-center justify-center gap-2 break-keep ${THEME_COLORS[tempSettings.theme]?.saveBtn || 'bg-emerald-600 hover:bg-emerald-700'}`}>
                                        <Icon name="save" size={20} /> 설정 저장하기
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
